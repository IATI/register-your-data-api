[project]
name = "register-your-data-api"
version = "0.1.0"
requires-python = ">= 3.12.11"
readme = "README.md"
authors = [{name="IATI Secretariat", email="support@iatistandard.org"}]
license = {file = "LICENSE"}
description = "API for writing to the IATI Registry"

dependencies = [
    "cryptography==45.0.5",
    "fastapi[standard]==0.116.0",
    "prometheus-client>=0.22.1",
    "pyjwt>=2.10.0",
    "python-dotenv>=1.1.1",
    "requests==2.32.4",
    "types-requests==2.32.4.20250611"
]

[project.optional-dependencies]
dev = [
    "bandit[baseline]",
    "black",
    "flake8",
    "flake8-pyproject",
    "isort",
    "mypy",
    "pip-tools",
    "pytest"
]

[tool.bandit.assert_used]
skips = ["*/tests/security/test_*.py", "*/tests/unit/test_*.py"]

[tool.mypy]
strict = true
mypy_path = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests/unit", "tests/security"]
addopts = [
    "--import-mode=importlib"
]
pythonpath = [
  "src", "tests"
]

[tool.pip-tools]
strip-extras = true

[tool.isort]
py_version=312
extend_skip = ['__pycache__']
skip_gitignore = true
src_paths = ['src', 'tests']
line_length = 119
profile = "black"

[tool.flake8]
max-line-length = 119
extend_ignore = ['E203', 'W503', 'E275']
exclude = ['__pycache__', '.pytest_cache']
max_complexity = 7

[tool.black]
line-length = 119
target-version = ['py312']
include='''/.*/*.py$'''
